name: Publish npm packages

on:
  workflow_dispatch: {}
  push:
    tags: ['core-v*']

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - run: bun install --frozen-lockfile

      - name: Build packages
        run: bun run build

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: 'https://registry.npmjs.org'

      # dist is already built above, so skip the prepublishOnly rebuild.
      # Only publish a version that isn't already on npm (idempotent re-runs).
      - name: Publish @qdev.app/abd-core
        working-directory: packages/core
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@qdev.app/abd-core@$V" version >/dev/null 2>&1; then
            echo "@qdev.app/abd-core@$V already on npm — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Publish @qdev.app/abd-react
        working-directory: packages/react
        run: |
          V=$(node -p "require('./package.json').version")
          if npm view "@qdev.app/abd-react@$V" version >/dev/null 2>&1; then
            echo "@qdev.app/abd-react@$V already on npm — skipping"
          else
            npm publish --access public --ignore-scripts
          fi
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
